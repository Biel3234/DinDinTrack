<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}DinDinTrack{% endblock %}</title>
    <style>
        :root{
            --bg:#fbf9ff;
            --card:#ffffff;
            --muted:#6b7280;
            --accent-1:#f6d7e8;
            --accent-2:#dfe7ff;
            --accent-3:#e9f7e9;
            --text:#0f172a;
        }
        *{box-sizing:border-box}
        body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background:var(--bg); color:var(--text); margin:0; padding:28px}
        .container{max-width:980px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .brand{font-weight:700;font-size:1.25rem}
        .card{padding:14px;border-radius:12px;background:var(--card);box-shadow:0 6px 18px rgba(15,23,42,0.04);margin-bottom:12px}
        .form{background:linear-gradient(180deg,var(--card),#fff);padding:16px;border-radius:10px}
        label{display:block;font-size:.95rem;margin:8px 0 6px;color:var(--muted)}
        input[type="text"],input[type="password"],input[type="number"],select,textarea{width:100%;padding:10px;border:1px solid #eef2f7;border-radius:8px;background:transparent}
        button{display:inline-block;padding:9px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer}
        button.primary{background:linear-gradient(90deg,var(--accent-2),var(--accent-1));font-weight:600;color:var(--text);box-shadow:0 6px 14px rgba(150,150,170,0.06)}
        a{color:inherit;text-decoration:none}
        .list{list-style:none;padding:0;margin:0}
        .list li{padding:10px 0;border-bottom:1px solid #fafafa;display:flex;justify-content:space-between;align-items:center}
        .cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px}
        .muted{color:var(--muted);font-size:.95rem}
        .footer{margin-top:28px;font-size:.85rem;color:var(--muted);text-align:center}
        @media (max-width:640px){.header{flex-direction:column;align-items:flex-start}}
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="brand">DinDinTrack</div>
            <nav class="muted">
                <a href="{% url 'home' %}">Início</a> &nbsp;•&nbsp; <a href="{% url 'deslogar' %}">Sair</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="footer card">
            Feito com ♥ — Interface minimalista em tons pastéis
        </footer>
    </div>
</body>
</html>
