{% extends "base.html" %}
{% load l10n %}
{% block title %}Editar Transação{% endblock %}
{% block content %}
<h1>Editar Transação</h1>
<form action="{% url 'editar' transacao.id %}" method="post" class="form">
    {% csrf_token %}
    <label for="descricao">Descrição:</label>
    <input type="text" id="descricao" name="descricao" value="{{ transacao.descricao }}" required>

    <label for="valor">Valor:</label>
    <input type="number" id="valor" name="valor" value="{{ transacao.valor|unlocalize }}" step="0.01" required>

    <label for="tipo">Tipo:</label>
    <select id="tipo" name="tipo" required>
        <option value="entrada" {% if transacao.tipo == 'entrada' %}selected{% endif %}>Entrada</option>
        <option value="saida" {% if transacao.tipo == 'saida' %}selected{% endif %}>Saída</option>
    </select>

    <div style="margin-top:12px"><button type="submit" class="primary">Salvar</button></div>
</form>
{% endblock %}
