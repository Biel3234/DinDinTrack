{% extends "base.html" %}
{% block title %}DinDinTrack - Cadastro{% endblock %}
{% block content %}
<h1>Cadastro</h1>
<form action="{% url 'cadastro' %}" method="post" class="form">
    {% csrf_token %}
    {% for field in formulario %}
        <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
        {{ field }}
    {% endfor %}
    <div style="margin-top:12px"><button type="submit" class="primary">Cadastrar</button></div>
</form>
{% endblock %}
