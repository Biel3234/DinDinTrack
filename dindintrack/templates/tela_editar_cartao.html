{% extends "base.html" %}
{% load l10n %}
{% block title %}Editar Cartão{% endblock %}
{% block content %}
<h1>Editar Cartão</h1>
<form action="{% url 'editar_cartao' cartao.id %}" method="post" class="form">
    {% csrf_token %}
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" value="{{ cartao.nome }}" required>

    <label for="descricao">Descrição:</label>
    <input type="text" id="descricao" name="descricao" value="{{ cartao.descricao }}">

    <label for="limite">Limite:</label>
    <input type="number" id="limite" name="limite" value="{{ cartao.limite|unlocalize }}" step="0.01" required>

    <label for="vencimento_fatura">Vencimento da Fatura:</label>
    <input type="number" id="vencimento_fatura" name="vencimento_fatura" value="{{ cartao.vencimento_fatura }}" min="1" max="31" required>

    <label for="fechamento_fatura">Fechamento da Fatura:</label>
    <input type="number" id="fechamento_fatura" name="fechamento_fatura" value="{{ cartao.fechamento_fatura }}" min="1" max="31" required>

    <div style="margin-top:12px">
        <button type="submit" class="primary">Salvar</button>
    </div>
</form>
{% endblock %}
