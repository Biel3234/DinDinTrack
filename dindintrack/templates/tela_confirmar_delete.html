{% extends "base.html" %}
{% block title %}Confirmar Exclusão{% endblock %}
{% block content %}
<h2>Confirmar Exclusão</h2>
<p>Tem certeza que deseja excluir este item?</p>
<form action="{% url 'deletar' transacao.id %}" method="post" class="form">
    {% csrf_token %}
    <div style="display:flex;gap:8px">
        <button type="submit" class="primary">Confirmar</button>
        <a href="{% url 'render_create' %}">Cancelar</a>
    </div>
</form>
{% endblock %}
