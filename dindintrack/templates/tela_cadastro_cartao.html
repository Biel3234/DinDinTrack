{% extends "base.html" %}
{% block title %}DinDinTrack - Cadastro de Cartão{% endblock %}
{% block content %}
<h1>Cadastro de Cartão</h1>
<form action="{% url 'criar_cartao' %}" method="post" class="form">
    {% csrf_token %}
    {% for field in formulario %}
        <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
        {{ field }}
    {% endfor %}
    <div style="margin-top:12px"><button type="submit" class="primary">Cadastrar Cartão</button></div>
</form>
{% endblock %}
